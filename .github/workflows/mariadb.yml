name: postgres

on: workflow_dispatch

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version:
          - IMAGE_FROM: "mariadb:12.2.2"
            TO: "davyin/images:mariadb-12.2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to aliyun
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUNCR_USERNAME }}
          password: ${{ secrets.ALIYUNCR_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: "{{defaultContext}}"
          platforms: linux/amd64,linux/arm64
          file: "Dockerfile"
          tags: registry.cn-hangzhou.aliyuncs.com/${{ matrix.version.TO }}
          build-args: |
            IMAGE_FROM=${{ matrix.version.IMAGE_FROM }}